name: Test

on:
  push:
    branches: [main, redis-adapter-lite]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install Redis server
      run: |
        tar xzf .github/redis-server.tar.gz
        sudo mv redis-server /usr/local/bin/

    - name: Start Redis server
      run: redis-server --daemonize yes --save "" --appendonly no

    - name: Configure
      run: cmake -S . -B build -DRAL_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Debug

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run unit tests
      run: ./build/ral-test-unit --gtest_output=xml:build/unit-results.xml

    - name: Run integration tests
      run: ./build/ral-test-integration --gtest_output=xml:build/integration-results.xml

    - name: Run regression tests
      run: ./build/ral-test-regressions --gtest_output=xml:build/regression-results.xml

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: build/*-results.xml
