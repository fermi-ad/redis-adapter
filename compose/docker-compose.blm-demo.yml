#
#  BLM Demo — 3 containers, beam loss monitor pipeline
#
#  blm-twin simulates an 8-channel beam loss monitor at 1 MHz:
#    CH0 sees full loss (scale 1.0), CH7 sees 10% (scale 0.1)
#    Loss pulse: Gaussian at 50% of waveform, amplitude 1.0
#
#  blm adapter runs the processing chain in one process:
#    demux → raw waveforms ×8, EMA filter on CH0,
#    10ms integration (5-bin waveform), 50ms integration (scalar),
#    5-minute running averages on both
#
#  All twin parameters settable at runtime:
#    redis-cli XADD BLM:0001:LOSS_AMPLITUDE_S '*' v 2.5
#    redis-cli XADD BLM:0001:LOSS_ENABLE_S '*' v 0
#    redis-cli XADD BLM:0001:CH0_SCALE_S '*' v 0.5
#
#  Usage:
#    docker compose -f compose/docker-compose.blm-demo.yml build
#    docker compose -f compose/docker-compose.blm-demo.yml up -d
#    redis-cli XREVRANGE BLM:0001:INTEG_50MS_CH0 + - COUNT 1
#    docker compose -f compose/docker-compose.blm-demo.yml down
#

services:

  redis:
    image: redis:7.4
    ports:
      - "6379:6379"
    command: >
      redis-server
        --appendonly no
        --save ""
        --bind 0.0.0.0
        --protected-mode no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  blm-twin:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../adapters/blm-twin/configs:/etc/adapters/blm-twin:ro
    command: ["/blm-twin", "/etc/adapters/blm-twin/blm-demo.yml"]

  blm:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      blm-twin:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ../adapters/blm/configs:/etc/adapters/blm:ro
    command: ["/blm", "/etc/adapters/blm/blm-demo.yml"]
