#
#  Unified Adapter Compose
#
#  Demo profiles (single Redis, example configs):
#    pipeline  — individual signal-processing adapters
#    bpm-demo  — BPM composite adapter + twin
#    blm-demo  — BLM adapter + twin
#    bcm-demo  — BCM adapter + twin
#
#  System profiles (92 Redis + 220 twins + 220 adapters):
#    tiny   — 10 BPM + 10 BLM + 5 BCM (64 services)
#    small  — 35 BPM + 65 BLM + 10 BCM (267 services)
#    medium — 47 BPM + 87 BLM + 14 BCM (358 services)
#    large  — 59 BPM + 109 BLM + 17 BCM (448 services)
#    full   — 70 BPM + 130 BLM + 20 BCM (532 services)
#
#  TUI tools (interactive, use with `docker compose run`):
#    inst-tui  — instrument dashboard (BPM/BLM/BCM)
#    redis-tui — Redis stream inspector
#
#  Generated by generate_system.py
#
#  Usage:
#    cd adapters && python3 generate_system.py
#    docker compose --profile bpm-demo up -d
#    docker compose --profile tiny up -d
#    docker compose --profile tui run --rm inst-tui
#    docker compose --profile tui run --rm redis-tui
#    docker compose --profile tiny down
#

services:
  redis:
    image: redis:7.4
    profiles:
    - pipeline
    - bpm-demo
    - blm-demo
    - bcm-demo
    ports:
    - 6379:6379
    command: redis-server --appendonly no --save "" --bind 0.0.0.0 --protected-mode
      no
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 2s
      timeout: 3s
      retries: 5
  device-twin:
    image: redis-adapter:latest
    build: &id001
      context: ..
      dockerfile: Dockerfile
    profiles:
    - pipeline
    depends_on:
      redis:
        condition: service_healthy
    volumes:
    - ./device-twin/configs:/etc/adapters/device-twin:ro
    command:
    - /device-twin
    - /etc/adapters/device-twin/acct-example.yml
  baseline-subtract:
    image: redis-adapter:latest
    build: *id001
