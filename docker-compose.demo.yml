#
#  BPM Demo — 3 containers, full signal processing pipeline
#
#  bpm-twin simulates a 4-button BPM with beam at (2mm, -1mm):
#    CH0 (H+) amplitude = 1.2    CH1 (H−) amplitude = 0.8
#    CH2 (V+) amplitude = 0.9    CH3 (V−) amplitude = 1.1
#
#  bpm adapter runs the entire processing chain in one process:
#    demux → magnitude ×4 → position H/V, baseline-subtract,
#    filter, FFT, integrate (narrow + wide + 5-min averages)
#
#  All twin parameters settable at runtime:
#    redis-cli XADD BPM:0001:BEAM_X_S '*' v 5.0
#    redis-cli XADD BPM:0001:BEAM_Y_S '*' v -3.0
#
#  Usage:
#    docker compose -f docker-compose.demo.yml build
#    docker compose -f docker-compose.demo.yml up -d
#    redis-cli XREVRANGE BPM:0001:POS_H + - COUNT 1
#    docker compose -f docker-compose.demo.yml down
#

services:

  redis:
    image: redis:7.4
    ports:
      - "6379:6379"
    command: >
      redis-server
        --appendonly no
        --save ""
        --bind 0.0.0.0
        --protected-mode no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  bpm-twin:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./adapters/bpm-twin/configs:/etc/adapters/bpm-twin:ro
    command: ["/bpm-twin", "/etc/adapters/bpm-twin/bpm-demo.yml"]

  bpm:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      bpm-twin:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./adapters/bpm/configs:/etc/adapters/bpm:ro
    command: ["/bpm", "/etc/adapters/bpm/bpm-demo.yml"]
