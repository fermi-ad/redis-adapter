{{- $count := include "redis-adapter.bcmCount" . | int }}
{{- range $i := until $count }}
{{- $id := printf "%02d" (add1 $i) }}
{{- $redisId := printf "%02d" (add1 (div $i 4)) }}
{{- $redisHost := printf "redis-bcm-%s" $redisId }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bcm-twin-{{ $id }}
  labels:
    {{- include "redis-adapter.labels" $ | nindent 4 }}
    app.kubernetes.io/component: twin
    redis-adapter/device-type: bcm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bcm-twin-{{ $id }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bcm-twin-{{ $id }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: twin
        redis-adapter/device-type: bcm
    spec:
      initContainers:
        - name: wait-for-redis
          image: {{ $.Values.initImage }}
          command: ['sh', '-c', 'until nc -z {{ $redisHost }} 6379; do sleep 1; done']
      containers:
        - name: bcm-twin
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command: ["/bcm-twin", "/etc/adapters/system/bcm-twin/bcm-twin-{{ $id }}.yml"]
          volumeMounts:
            - name: config
              mountPath: /etc/adapters/system/bcm-twin/bcm-twin-{{ $id }}.yml
              subPath: bcm-twin-{{ $id }}.yml
              readOnly: true
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: {{ include "redis-adapter.fullname" $ }}-bcm-twin-configs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bcm-{{ $id }}
  labels:
    {{- include "redis-adapter.labels" $ | nindent 4 }}
    app.kubernetes.io/component: adapter
    redis-adapter/device-type: bcm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bcm-{{ $id }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bcm-{{ $id }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: adapter
        redis-adapter/device-type: bcm
    spec:
      initContainers:
        - name: wait-for-redis
          image: {{ $.Values.initImage }}
          command: ['sh', '-c', 'until nc -z {{ $redisHost }} 6379; do sleep 1; done']
      containers:
        - name: bcm
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command: ["/bcm", "/etc/adapters/system/bcm/bcm-{{ $id }}.yml"]
          volumeMounts:
            - name: config
              mountPath: /etc/adapters/system/bcm/bcm-{{ $id }}.yml
              subPath: bcm-{{ $id }}.yml
              readOnly: true
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: {{ include "redis-adapter.fullname" $ }}-bcm-configs
{{- end }}
