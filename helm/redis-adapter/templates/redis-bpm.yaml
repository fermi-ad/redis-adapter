{{- $count := include "redis-adapter.bpmCount" . | int }}
{{- range $i := until $count }}
{{- $id := printf "%03d" (add1 $i) }}
---
apiVersion: v1
kind: Service
metadata:
  name: redis-bpm-{{ $id }}
  labels:
    {{- include "redis-adapter.labels" $ | nindent 4 }}
    app.kubernetes.io/component: redis
    redis-adapter/device-type: bpm
spec:
  selector:
    app.kubernetes.io/name: redis-bpm-{{ $id }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-bpm-{{ $id }}
  labels:
    {{- include "redis-adapter.labels" $ | nindent 4 }}
    app.kubernetes.io/component: redis
    redis-adapter/device-type: bpm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-bpm-{{ $id }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-bpm-{{ $id }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: redis
        redis-adapter/device-type: bpm
    spec:
      containers:
        - name: redis
          image: {{ $.Values.redis.image }}
          command:
            - redis-server
            - --appendonly
            - "no"
            - --save
            - ""
            - --bind
            - 0.0.0.0
            - --protected-mode
            - "no"
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
{{- end }}
