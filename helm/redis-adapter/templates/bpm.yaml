{{- $count := include "redis-adapter.bpmCount" . | int }}
{{- range $i := until $count }}
{{- $id := printf "%03d" (add1 $i) }}
{{- $redisHost := printf "redis-bpm-%s" $id }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bpm-twin-{{ $id }}
  labels:
    {{- include "redis-adapter.labels" $ | nindent 4 }}
    app.kubernetes.io/component: twin
    redis-adapter/device-type: bpm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bpm-twin-{{ $id }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bpm-twin-{{ $id }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: twin
        redis-adapter/device-type: bpm
    spec:
      initContainers:
        - name: wait-for-redis
          image: {{ $.Values.initImage }}
          command: ['sh', '-c', 'until nc -z {{ $redisHost }} 6379; do sleep 1; done']
      containers:
        - name: bpm-twin
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command: ["/bpm-twin", "/etc/adapters/system/bpm-twin/bpm-twin-{{ $id }}.yml"]
          volumeMounts:
            - name: config
              mountPath: /etc/adapters/system/bpm-twin/bpm-twin-{{ $id }}.yml
              subPath: bpm-twin-{{ $id }}.yml
              readOnly: true
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: {{ include "redis-adapter.fullname" $ }}-bpm-twin-configs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bpm-{{ $id }}
  labels:
    {{- include "redis-adapter.labels" $ | nindent 4 }}
    app.kubernetes.io/component: adapter
    redis-adapter/device-type: bpm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bpm-{{ $id }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bpm-{{ $id }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: adapter
        redis-adapter/device-type: bpm
    spec:
      initContainers:
        - name: wait-for-redis
          image: {{ $.Values.initImage }}
          command: ['sh', '-c', 'until nc -z {{ $redisHost }} 6379; do sleep 1; done']
      containers:
        - name: bpm
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command: ["/bpm", "/etc/adapters/system/bpm/bpm-{{ $id }}.yml"]
          volumeMounts:
            - name: config
              mountPath: /etc/adapters/system/bpm/bpm-{{ $id }}.yml
              subPath: bpm-{{ $id }}.yml
              readOnly: true
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: {{ include "redis-adapter.fullname" $ }}-bpm-configs
{{- end }}
