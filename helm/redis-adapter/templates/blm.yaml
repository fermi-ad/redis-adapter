{{- $count := include "redis-adapter.blmCount" . | int }}
{{- range $i := until $count }}
{{- $id := printf "%03d" (add1 $i) }}
{{- $redisId := printf "%02d" (add1 (div $i 8)) }}
{{- $redisHost := printf "redis-blm-%s" $redisId }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blm-twin-{{ $id }}
  labels:
    {{- include "redis-adapter.labels" $ | nindent 4 }}
    app.kubernetes.io/component: twin
    redis-adapter/device-type: blm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blm-twin-{{ $id }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blm-twin-{{ $id }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: twin
        redis-adapter/device-type: blm
    spec:
      initContainers:
        - name: wait-for-redis
          image: {{ $.Values.initImage }}
          command: ['sh', '-c', 'until nc -z {{ $redisHost }} 6379; do sleep 1; done']
      containers:
        - name: blm-twin
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command: ["/blm-twin", "/etc/adapters/system/blm-twin/blm-twin-{{ $id }}.yml"]
          volumeMounts:
            - name: config
              mountPath: /etc/adapters/system/blm-twin/blm-twin-{{ $id }}.yml
              subPath: blm-twin-{{ $id }}.yml
              readOnly: true
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: {{ include "redis-adapter.fullname" $ }}-blm-twin-configs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blm-{{ $id }}
  labels:
    {{- include "redis-adapter.labels" $ | nindent 4 }}
    app.kubernetes.io/component: adapter
    redis-adapter/device-type: blm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blm-{{ $id }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blm-{{ $id }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: adapter
        redis-adapter/device-type: blm
    spec:
      initContainers:
        - name: wait-for-redis
          image: {{ $.Values.initImage }}
          command: ['sh', '-c', 'until nc -z {{ $redisHost }} 6379; do sleep 1; done']
      containers:
        - name: blm
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command: ["/blm", "/etc/adapters/system/blm/blm-{{ $id }}.yml"]
          volumeMounts:
            - name: config
              mountPath: /etc/adapters/system/blm/blm-{{ $id }}.yml
              subPath: blm-{{ $id }}.yml
              readOnly: true
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: {{ include "redis-adapter.fullname" $ }}-blm-configs
{{- end }}
