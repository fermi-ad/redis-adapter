services:

  redis:
    image: redis:7.4
    ports:
      - "6379:6379"
    command: >
      redis-server
        --appendonly no
        --save ""
        --bind 0.0.0.0
        --protected-mode no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  device-twin:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./adapters/device-twin/configs:/etc/adapters/device-twin:ro
    command: ["/etc/adapters/device-twin/acct-example.yml"]
