services:

  redis:
    image: redis:7.4
    ports:
      - "6379:6379"
    command: >
      redis-server
        --appendonly no
        --save ""
        --bind 0.0.0.0
        --protected-mode no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  device-twin:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./adapters/device-twin/configs:/etc/adapters/device-twin:ro
    command: ["/device-twin", "/etc/adapters/device-twin/acct-example.yml"]

  baseline-subtract:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      device-twin:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./adapters/baseline-subtract/configs:/etc/adapters/baseline-subtract:ro
    command: ["/baseline-subtract", "/etc/adapters/baseline-subtract/baseline-subtract-example.yml"]

  integrate:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      device-twin:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./adapters/integrate/configs:/etc/adapters/integrate:ro
    command: ["/integrate", "/etc/adapters/integrate/integrate-example.yml"]

  filter:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      device-twin:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./adapters/filter/configs:/etc/adapters/filter:ro
    command: ["/filter", "/etc/adapters/filter/filter-example.yml"]

  magnitude:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      device-twin:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./adapters/magnitude/configs:/etc/adapters/magnitude:ro
    command: ["/magnitude", "/etc/adapters/magnitude/magnitude-example.yml"]

  position-intensity:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      device-twin:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./adapters/position-intensity/configs:/etc/adapters/position-intensity:ro
    command: ["/position-intensity", "/etc/adapters/position-intensity/position-intensity-example.yml"]

  demux:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      device-twin:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./adapters/demux/configs:/etc/adapters/demux:ro
    command: ["/demux", "/etc/adapters/demux/demux-example.yml"]

  fft:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      device-twin:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./adapters/fft/configs:/etc/adapters/fft:ro
    command: ["/fft", "/etc/adapters/fft/fft-example.yml"]
